<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Jefran</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.heart{
    position:relative;
    width:100vw;
    height:100vh;
    animation:beat 1.5s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.text{
    position:absolute;
    color:red;
    font-size:9px;
    font-weight:bold;
    white-space:nowrap;
    text-shadow:0 0 5px red;
    animation:float 2s infinite alternate;
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-6px);}
}

.name{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:red;
    font-size:42px;
    font-weight:bold;
    text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px red;
    animation:glow 1.5s infinite alternate;
}

@keyframes glow{
    from{opacity:.7;}
    to{opacity:1;}
}

.flying-heart{
    position:fixed;
    color:red;
    font-size:24px;
    pointer-events:none;
    animation:fly 4s linear forwards;
}

@keyframes fly{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<audio autoplay loop controls>
    <source src="lover.m4a" type="audio/mp4">
</audio>

<div class="heart" id="heart">
    <div class="name">Jefran</div>
</div>

<script>
const heart = document.getElementById("heart");

function createText(x,y){
    const span = document.createElement("span");
    span.className = "text";
    span.innerText = "I LOVE YOU";
    span.style.left = x + "px";
    span.style.top = y + "px";
    span.style.animationDuration = (Math.random()*2+1) + "s";
    heart.appendChild(span);
}

const centerX = window.innerWidth / 2;
const centerY = window.innerHeight / 2;

for(let t=0; t<Math.PI*2; t+=0.08){

    let x = 16 * Math.pow(Math.sin(t),3);
    let y = 13 * Math.cos(t)
          - 5 * Math.cos(2*t)
          - 2 * Math.cos(3*t)
          - Math.cos(4*t);

    x = x * 12 + centerX;
    y = -y * 12 + centerY;

    createText(x,y);
}

setInterval(() => {
    const h = document.createElement("div");

    h.className = "flying-heart";
    h.innerHTML = "❤";

    h.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(h);

    setTimeout(() => {
        h.remove();
    }, 4000);

}, 300);
</script>

</body>
</html>
